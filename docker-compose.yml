# منصة سهم سكرينر على خادم خاص: التطبيق + قاعدة البيانات + Caddy (شهادة TLS تلقائية)
# الإعداد: انسخ deploy/.env.server.example إلى .env ثم: docker compose up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sahm:${POSTGRES_PASSWORD}@db:5432/sahm
      AUTH_SECRET: ${AUTH_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      # اختياري: مزوّدات واتساب/فينفيز
      FINVIZ_AUTH_TOKEN: ${FINVIZ_AUTH_TOKEN:-}
      CALLMEBOT_PHONE: ${CALLMEBOT_PHONE:-}
      CALLMEBOT_APIKEY: ${CALLMEBOT_APIKEY:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      WHATSAPP_TO: ${WHATSAPP_TO:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  # يهيّئ جداول قاعدة البيانات مرة واحدة قبل إقلاع التطبيق
  migrate:
    build:
      context: .
      target: migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://sahm:${POSTGRES_PASSWORD}@db:5432/sahm
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sahm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sahm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahm -d sahm"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # الجدولة اليومية للملخص (بديل Vercel Cron على الخادم الخاص)
  cron:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
    command: >
      /bin/sh -c "echo '30 15 * * 1-5 wget -qO- http://app:3000/api/digest?secret=$$CRON_SECRET' | crontab - && crond -f -l 8"
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
